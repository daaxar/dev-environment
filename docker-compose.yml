services:
  dev-container:
    build:
      context: ${PWD}
      dockerfile: /home/daaxar/dev/daaxar/envDev/Dockerfile
    container_name: ${DEV_CONTAINER_NAME:-dev-isolated}
    volumes:
      - ${PWD}:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - ENV=development
      - CLEAN_ENV=true
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    networks:
      - isolated-network

networks:
  isolated-network:
    driver: bridge